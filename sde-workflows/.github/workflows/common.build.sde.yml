name: Synergy Data Exchange Build Actions

on:
  workflow_call:
    inputs:
      daysToRetain:
        required: true
        type: string
      gitversion:
        required: true
        type: string
      SDEChangesFound:
        required: true
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  PYTHON_VERSION: '3.12'

jobs:
  Build-SDE-CI:
    if: inputs.SDEChangesFound == 'true'
    permissions:
      packages: read
      contents: read
      id-token: write
      checks: write
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: "Checkout Source"
        uses: actions/checkout@v4

      - name: "Setup .NET Core"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: "ga"

      - name: "Setup Node.js for CDK"
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Install AWS CDK"
        run: npm install -g aws-cdk

      - name: "Checkout Composite Action Repository"
        uses: actions/checkout@v4
        with:
          repository: ExtremeEventSolutions/ees-compositeactions
          ref: releases/34
          path: "compositeactions"
          token: ${{ secrets.EES_COMPOSITEACTIONS_TOKEN }}

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: "EES-AP-SDE-Build-CI"
          aws-region: us-east-1

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Restore .NET Dependencies"
        run: dotnet restore EES.AP.SDE.CDK.sln
        working-directory: cdk

      - name: "Build CDK Project"
        run: dotnet build src/EES.AP.SDE.CDK/EES.AP.SDE.CDK.csproj -c Release
        working-directory: cdk

      - name: "CDK Synth (Validate)"
        run: |
          cdk synth --context TargetEnvironment=dev --context DeployAllStacks=true
        working-directory: cdk

      - name: "Install Python Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run Python Tests"
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short || true

      - name: "Build and Push Docker Images to ECR"
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.gitversion }}
        run: |
          # ECR repo names follow CDK naming: ss-cdk{stage}-sde-{type}
          # Account/region come from the ECR login step above
          REPO_BASE="${ECR_REGISTRY}/ss-cdkdev-Synergy Data Exchange"

          # Express (PATH 1)
          docker build -f docker/Dockerfile.express \
            -t ${REPO_BASE}-express:${IMAGE_TAG} \
            -t ${REPO_BASE}-express:latest .
          docker push ${REPO_BASE}-express:${IMAGE_TAG}
          docker push ${REPO_BASE}-express:latest

          # Standard (PATH 2)
          docker build -f docker/Dockerfile.standard \
            -t ${REPO_BASE}-standard:${IMAGE_TAG} \
            -t ${REPO_BASE}-standard:latest .
          docker push ${REPO_BASE}-standard:${IMAGE_TAG}
          docker push ${REPO_BASE}-standard:latest

          # Batch (PATH 3)
          docker build -f docker/Dockerfile.batch \
            -t ${REPO_BASE}-batch:${IMAGE_TAG} \
            -t ${REPO_BASE}-batch:latest .
          docker push ${REPO_BASE}-batch:${IMAGE_TAG}
          docker push ${REPO_BASE}-batch:latest

      - name: "Upload CDK Build Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "sde_cdk"
          path: "cdk/src/EES.AP.SDE.CDK/bin/Release/net8.0"
          if-no-files-found: error
          retention-days: ${{ inputs.daysToRetain }}

      - name: "Upload Python Source Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "sde_python"
          path: |
            src/
            requirements.txt
          if-no-files-found: error
          retention-days: ${{ inputs.daysToRetain }}

  Build-SDE-NoChanges:
    if: inputs.SDEChangesFound != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip Build
        run: echo "No Synergy Data Exchange changes found, skipping build"
        shell: bash
