# Local development compose file
# Runs SQL Server Express with persistent volume for testing

version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: dataingestion-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
      - SA_PASSWORD=${SQL_SA_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_COLLATION=SQL_Latin1_General_CP1_CI_AS
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: dataingestion-pipeline
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SQL_HOST=sqlserver
      - SQL_PORT=1433
      - SQL_USER=sa
      - SQL_PASSWORD=${SQL_SA_PASSWORD:-YourStrong@Passw0rd}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # SID Transformation Configuration (always enabled; SID_USE_MOCK=true for local dev)
      - SID_API_URL=${SID_API_URL:-}
      - TENANT_CONTEXT_LAMBDA=${TENANT_CONTEXT_LAMBDA:-rs-cdkdev-ap-tenant-context-lambda}
      - APP_TOKEN_SECRET=${APP_TOKEN_SECRET:-rs-cdkdev-app-token-secret}
      - SID_MAX_RETRIES=${SID_MAX_RETRIES:-3}
      - SID_USE_MOCK=${SID_USE_MOCK:-true}
      - SID_MOCK_STARTING_SID=${SID_MOCK_STARTING_SID:-1000000}
    volumes:
      - ../:/app
      - ~/.aws:/root/.aws:ro  # Mount AWS credentials for local testing
    command: ["--help"]  # Override with actual extraction parameters

volumes:
  sqlserver_data:
